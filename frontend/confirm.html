<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Confirm Receipt — Bond Escrow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/styles.css"/>
</head>
<body>
  <nav class="navbar"><a href="index.html" class="brand">Bond</a></nav>
  <main class="page-center">
    <div class="card form-card">
      <div class="state-badge badge-delivered">DELIVERED</div>
      <h1 class="page-title">Confirm Receipt</h1>
      <p class="page-sub">Did you receive what was agreed? Confirm to release funds, or raise a dispute.</p>

      <div class="summary-card" id="summaryCard">
        <div class="summary-amount" id="amount">₹—</div>
        <div class="summary-item" id="itemName">Loading…</div>
        <div class="summary-row"><span>Delivery Note</span></div>
        <div id="deliveryNote" class="delivery-note-text">—</div>
      </div>

      <div id="actions" class="confirm-actions">
        <button id="confirmBtn" class="btn-primary btn-full btn-lg">Confirm & Release Funds ✓</button>
        <a id="disputeBtn" href="#" class="btn-amber btn-full">Raise Dispute ⚠</a>
      </div>

      <div id="releasedBanner" class="released-banner hidden">
        🎉 Funds Released to Seller! Transaction Complete.
      </div>

      <div class="stepper">
        <div class="step done">CREATED</div>
        <div class="step-line done-line"></div>
        <div class="step done">FUNDED</div>
        <div class="step-line done-line"></div>
        <div class="step active">DELIVERED</div>
        <div class="step-line"></div>
        <div class="step">CONFIRMED</div>
        <div class="step-line"></div>
        <div class="step">RELEASED</div>
      </div>
    </div>
  </main>
  <script>
    const API = 'http://localhost:3001';
    const id = new URLSearchParams(location.search).get('id')?.toUpperCase();

    async function load() {
      if (!id) return;
      const res = await fetch(`${API}/api/escrow/${id}`);
      const txn = await res.json();
      document.getElementById('amount').textContent = `₹${txn.amountINR.toLocaleString('en-IN')}`;
      document.getElementById('itemName').textContent = txn.itemName;
      document.getElementById('deliveryNote').textContent = txn.deliveryNote || 'No note provided by seller.';
      document.getElementById('disputeBtn').href = `dispute.html?id=${txn.id}`;
    }

    document.getElementById('confirmBtn').addEventListener('click', async () => {
      const btn = document.getElementById('confirmBtn');
      btn.textContent = 'Releasing funds…'; btn.disabled = true;
      const res = await fetch(`${API}/api/escrow/${id}/confirm`, { method: 'POST' });
      const data = await res.json();
      if (data.ok) {
        document.getElementById('actions').classList.add('hidden');
        document.getElementById('releasedBanner').classList.remove('hidden');
      }
    });

    load();
  </script>
</body>
</html>
